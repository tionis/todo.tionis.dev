---
name: Deploy website

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: static-site-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Build website
        run: |
          npm ci
          npm run build
      - name: Deploy to Bunny
        if: github.event_name != 'pull_request'
        env:
          BUNNY_STORAGE_ZONE: todo-tionis-dev
          BUNNY_STORAGE_ENDPOINT: storage.bunnycdn.com
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
          BUNNY_PURGE_ENDPOINT: https://gandalf.bunny.run
        run: |
          curl -fsSL \
            https://forge.tionis.dev/actions/static-site-deploy/raw/commit/dec3f970f3da3d9c4b42ed51904b9474da4a4a86/static_site.py \
            -o /tmp/static-site.py
          echo '1b1a8b3ba3730e9afeda8069fb9495b3362aaad722e99201505559cebc005794  /tmp/static-site.py' |
            sha256sum --check
          python3 /tmp/static-site.py bunny out
