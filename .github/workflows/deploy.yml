---
name: Deploy website

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: static-site-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Build website
        run: |
          npm ci
          npm run build
      - name: Deploy to Bunny
        if: github.event_name != 'pull_request'
        env:
          BUNNY_STORAGE_ZONE: todo-tionis-dev
          BUNNY_STORAGE_ENDPOINT: storage.bunnycdn.com
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
          BUNNY_PURGE_ENDPOINT: https://gandalf.tionis.dev
        run: |
          curl -fsSL \
            https://forge.tionis.dev/actions/static-site-deploy/raw/commit/411010ef5a09ee576a9a30445d7931d32eabf94f/static_site.py \
            -o /tmp/static-site.py
          echo '58e435c273bae160839b70beb91ab3772800d589655021b3336d9172a272e8a9  /tmp/static-site.py' |
            sha256sum --check
          python3 /tmp/static-site.py bunny out
